name: Build iOS
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Install dependencies
        run: |
          # 自动扫描并找到 pubspec.yaml 所在的项目目录
          PROJECT_DIR=$(find . -name "pubspec.yaml" -type f -exec dirname {} \;)
          echo "✅ 找到项目目录: $PROJECT_DIR"
          # 进入项目目录并安装依赖
          cd "$PROJECT_DIR"
          flutter pub get
          cd ios
          pod repo update
          pod install

      - name: Build iOS
        run: |
          PROJECT_DIR=$(find . -name "pubspec.yaml" -type f -exec dirname {} \;)
          cd "$PROJECT_DIR"
          flutter build ios --release --no-codesign

      - name: Upload iOS App
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: ${{ env.PROJECT_DIR }}/build/ios/iphoneos/
