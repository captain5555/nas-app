workflows:
  android-build:
    name: Android Build
    instance_type: linux
    max_build_duration: 60
    environment:
      flutter: 3.16.9
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Clean and get dependencies
        script: |
          flutter clean
          flutter pub get
      - name: Build APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

  ios-build:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 90
    environment:
      flutter: 3.16.9
      xcode: 14.3
      cocoapods: 1.14.3
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Show versions
        script: |
          flutter --version
          xcodebuild -version
          pod --version
      - name: Clean
        script: |
          flutter clean
          rm -rf ios/Pods ios/Podfile.lock
      - name: Get dependencies
        script: |
          flutter pub get
      - name: Pod install
        script: |
          cd ios
          pod install
      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign
      - name: Create IPA
        script: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r build/ios/Runner.ipa Payload/
    artifacts:
      - build/ios/Runner.ipa
