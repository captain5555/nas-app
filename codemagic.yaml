workflows:
  android:
    name: Android APK Build
    instance_type: linux
    max_build_duration: 60
    environment:
      flutter: 3.16.9
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Get dependencies
        script: |
          flutter clean
          flutter pub get
      - name: Build APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
